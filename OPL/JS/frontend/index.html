<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canoga Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Canoga Game</h1>
    <div class="game-board">
      <div class="player-board" id="human-board">
        <h2>Human Player</h2>
        <div class="squares" id="human-squares"></div>
        <p>Score: <span id="human-score">0</span></p>
      </div>
      <div class="player-board" id="computer-board">
        <h2>Computer Player</h2>
        <div class="squares" id="computer-squares"></div>
        <p>Score: <span id="computer-score">0</span></p>
      </div>
    </div>
    <div class="controls">
      <button id="roll-dice">Roll Dice</button>
      <button id="new-round">New Round</button>
      <button id="help">Help</button>
    </div>
    <div class="dice-result">
      <p>Dice Roll: <span id="dice-roll"></span></p>
    </div>
    <div class="messages">
      <p id="game-message"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
